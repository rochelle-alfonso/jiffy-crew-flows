function c(jsx){
  let h=jsx.replace(/^\s*\(\s*/,'').replace(/\s*\)\s*$/,'');
  let r='',i=0;
  while(i<h.length){
    let p=h.indexOf('style={{',i);
    if(p===-1){r+=h.substring(i);break;}
    r+=h.substring(i,p);
    let s=p+8,d=2,j=s;
    while(j<h.length&&d>0){if(h[j]==='{')d++;else if(h[j]==='}')d--;j++;}
    let sc=h.substring(s,j-2),props=[];
    const rx=/(\w+):\s*(?:'([^']*)'|"([^"]*)"|(\d+(?:\.\d+)?))/g;
    let m;while((m=rx.exec(sc))!==null){
      let k=m[1],v=m[2]!==undefined?m[2]:(m[3]!==undefined?m[3]:m[4]);
      let ck=k.replace(/([A-Z])/g,x=>'-'+x.toLowerCase());
      props.push(ck+':'+v);
    }
    r+='style="'+props.join(';')+'"';i=j;
  }
  h=r;
  h=h.replace(/<div([^>]*?)\s*\/>/g,'<div$1></div>');
  h=h.replace(/strokeWidth=/g,'stroke-width=');
  h=h.replace(/strokeLinecap=/g,'stroke-linecap=');
  h=h.replace(/strokeLinejoin=/g,'stroke-linejoin=');
  h=h.replace(/fillRule=/g,'fill-rule=');
  h=h.replace(/clipRule=/g,'clip-rule=');
  h=h.replace(/calc\(infinity \* 1px\)/g,'9999px');
  return h.trim();
}

function makePlaceholder(id, label, data) {
  const bg = data.color || '#2563EB';
  let html = '<div style="display:flex;flex-direction:column;height:100%;background:#fff;font-family:Onest,system-ui,sans-serif;padding:0;">';
  // Status bar
  html += '<div style="display:flex;justify-content:space-between;padding:14px 24px 8px;font-size:15px;font-weight:600;color:#1A1A2E;"><span>9:41</span><span style="font-size:12px;">&#x1F4F6; &#x1F4F6; &#x1F50B;</span></div>';
  // Nav
  html += '<div style="display:flex;align-items:center;gap:16px;padding:8px 16px;"><div style="width:36px;height:36px;border-radius:18px;background:#F5F5F7;display:flex;align-items:center;justify-content:center;font-size:16px;">&lt;</div><div style="font-size:18px;font-weight:600;color:#1A1A2E;">' + (data.title || label) + '</div></div>';
  // Content
  html += '<div style="flex:1;padding:16px 16px 0;">';
  if (data.emoji) html += '<div style="text-align:center;font-size:48px;margin:24px 0 16px;">' + data.emoji + '</div>';
  if (data.subtitle) html += '<div style="font-size:14px;color:#71717A;margin-bottom:4px;">' + data.subtitle + '</div>';
  if (data.title && !data.emoji) html += '<div style="font-size:20px;font-weight:600;color:#1A1A2E;margin-bottom:8px;">' + data.title + '</div>';
  if (data.desc) html += '<div style="font-size:14px;color:#71717A;line-height:20px;margin-bottom:16px;">' + data.desc + '</div>';
  if (data.fields) {
    html += '<div style="background:#FBFBFB;border-radius:12px;padding:12px 16px;">';
    data.fields.forEach(f => {
      html += '<div style="padding:10px 0;border-bottom:1px solid #EBEBEB;font-size:13px;color:#1A1A2E;">' + f + '</div>';
    });
    html += '</div>';
  }
  html += '</div>';
  // Button
  html += '<div style="padding:16px 16px 32px;"><div style="background:' + bg + ';border-radius:28px;height:56px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:600;">' + (data.btn || 'Continue') + '</div></div>';
  html += '</div>';
  return html;
}

const grid = document.getElementById('grid');
screens.forEach((s,i) => {
  const card = document.createElement('div');
  card.className = 'screen-card';
  card.innerHTML = '<div class="screen-label">'+(i+1)+'. '+s.label+'</div><div class="screen-id">'+s.id+'</div>';
  const frame = document.createElement('div');
  frame.className = 'phone-frame';
  const content = document.createElement('div');
  content.className = 'screen-content';
  if (J[s.id]) {
    content.innerHTML = c(J[s.id]);
  } else if (placeholderScreens[s.id]) {
    content.innerHTML = makePlaceholder(s.id, s.label, placeholderScreens[s.id]);
  } else {
    content.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;background:#f8f8fa;"><div style="text-align:center;font-size:18px;font-weight:600;color:#1A1A2E;">'+s.label+'<br><span style="font-size:13px;color:#999;">'+s.id+'</span></div></div>';
  }
  frame.appendChild(content);
  card.appendChild(frame);
  grid.appendChild(card);
});
